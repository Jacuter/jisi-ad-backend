name: Build and Push to Volcano Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Volcano Engine Container Registry
        uses: docker/login-action@v3
        with:
          registry: jisi-backend-cn-beijing.cr.volces.com
          username: ${{ secrets.VOLCENGINE_REGISTRY_USERNAME }}
          password: ${{ secrets.VOLCENGINE_REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            jisi-backend-cn-beijing.cr.volces.com/jisi-backend:latest
            jisi-backend-cn-beijing.cr.volces.com/jisi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
